# CodeRabbit configuration. Schema: https://coderabbit.ai/integrations/schema.v2.json
# Docs: https://docs.coderabbit.ai/reference/configuration

language: "en-US"

# Voice rules lifted from CLAUDE.md: no em-dashes, direct/terse, match existing conventions.
tone_instructions: "Direct, terse feedback. Never use em-dashes (U+2014); flag any in prose, comments, or copy. Match existing repo conventions over inventing parallel ones."

early_access: false

reviews:
  profile: "chill"

  request_changes_workflow: false

  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true
  sequence_diagrams: false
  assess_linked_issues: true
  suggested_reviewers: true
  auto_apply_labels: false

  path_filters:
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/*.lock"

  path_instructions:
    - path: "**/*"
      instructions: "Flag any em-dash character (U+2014) in prose, comments, commit-style copy, or doc strings. Suggest a period, comma, colon, semicolon, parentheses, or hyphen instead."
    - path: "CURRENT.md"
      instructions: "This is the synthesized best-practices doc the user reads before significant agent-files edits. Flag claims that contradict the cached snapshots under sources/, broken cross-references to sources/ files, and a stale 'Last synthesized' date when content changed. Do not nitpick the author's opinions in the synthesis section."
    - path: "sources/**/*.md"
      instructions: "These are point-in-time, chrome-stripped snapshots of upstream vendor docs, not original prose. Do NOT flag wording, style, or structure inside the captured content. Only flag a missing/incorrect source URL, a missing fetch date, or a filename whose date does not match the documented YYYY-MM-DD convention."
    - path: "CLAUDE.md"
      instructions: "This repo's own CLAUDE.md must stay under ~200 lines per the convention it documents. Flag it if it grows past that, or if multi-step procedures creep in that belong in a skill or a path-scoped rule."
    - path: "skills/**/SKILL.md"
      instructions: "SKILL.md frontmatter must include name (matching the directory) and description (the trigger blurb Claude sees). The description is load-bearing: concrete trigger phrases beat abstract descriptions. Do NOT suggest quoting or block-scalaring the description for strict-YAML validity; Claude Code's loader is line-based and the unquoted-with-colons form is the established convention across all of the user's skills."

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"

  tools:
    github-checks:
      enabled: true
      timeout_ms: 90000
    markdownlint:
      enabled: true
    yamllint:
      enabled: true
    gitleaks:
      enabled: true

  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
  learnings:
    scope: "auto"
  issues:
    scope: "auto"
  pull_requests:
    scope: "auto"
  code_guidelines:
    enabled: true
    filePatterns:
      - "CLAUDE.md"
      - "**/CLAUDE.md"
      - "CURRENT.md"
      - "README.md"
